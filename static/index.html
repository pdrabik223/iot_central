<!DOCTYPE html>
<html lang="en">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">

    <title>IoT local</title>
    <script>

        async function onCheckboxChange(host_name, state, target) {
            request_url = ""
            if (state) {
                // target is already in `redirects_to`
                // so we remove it 
                request_url = `/v1/remove_redirect?host_name=${host_name}&target=${target}`
            } else {
                // add target to `redirects_to` 
                request_url = `/v1/add_redirect?host_name=${host_name}&target=${target}`
            }
            try {
                const resp = await fetch(request_url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                })

                if (!resp.ok) {
                    console.log(`Response status: ${resp.status}`)
                    alert(`Fetch error: ${resp.status}, retry later`);
                }

            } catch (error) {
                console.error(`Fetch error: ${error.message}, retry later`);
                alert(`Fetch error: ${error.message}, retry later`);
            }

            get_endpoint_config()

        }

        function getDropDown(host_name, redirects_to, options) {

            to_return = ""
            for (const option of options) {
                to_return += `<label><input 
                                type="checkbox" 
                                onchange="onCheckboxChange('${host_name}', ${redirects_to.includes(option) ? true : false}, '${option}')"
                                ${redirects_to.includes(option) ? "checked" : ""} 
                                value="${option}">${option}</label>`
            }

            return to_return
        }

        async function get_endpoint_config() {
            const table = document.getElementById('endpoint_config');
            try {
                const resp = await fetch(`/v1/get_endpoint_config`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                })

                if (!resp.ok) {
                    console.log(`Response status: ${resp.status}`)
                    document.getElementById('endpoint_config').innerHTML = '<p>Error loading WiFi list</p>'
                } else {
                    const row = table.rows[0];
                    while (table.rows.length > 1) {
                        table.deleteRow(1);
                    }
                    const resp_json = await resp.json()
                    let host_names = []

                    for (const config of resp_json) host_names.push(config["host_name"])

                    let index = 0
                    for (const config of resp_json) {
                        const newRow = document.createElement("tr");

                        let options = host_names.slice()

                        options.splice(index++, 1)

                        newRow.innerHTML = `
                            <tr> 
                                <td><a href="${config["ip"]}/v1/"> ${config["host_name"]}</a></td>
                                <td>${config["last_connection_time"]}</td>
                                <td>${getDropDown(config["host_name"], config["redirects_to"], options)}</td>
                            </tr>
                        `;

                        row.parentNode.insertBefore(newRow, row.nextSibling);
                    }
                }

            } catch (error) {
                console.error(error.message);
            }
        }

        window.addEventListener('load', get_endpoint_config);

    </script>
</head>

<body style="padding: 5% 5%; max-width: 1400px; min-width: 400px;  margin: auto;">
    <H1>Welcome to IoT Local</H1>
    <a href="/v1/wifi_config" class="button-class">Manage Wifi Config</a>

    <table id="endpoint_config">
        <thead>
            <tr>
                <th>Host Name</th>
                <th>Last Connection</th>
                <th>Redirects</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>



</body>

</html>
