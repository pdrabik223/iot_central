<!DOCTYPE html>
<html lang="en">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">

    <title>Manage wifi list</title>
    <style>
        body {
            padding: 1rem;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
        }

        #wifi_list table {
            width: 100%;
            border-collapse: collapse;
        }

        #wifi_list th,
        #wifi_list td {
            padding: 0.75rem 0.9rem;
        }

        #wifi_list tbody tr:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        #wifi_list .action-button {
            min-width: 2.5rem;
        }
    </style>
</head>

<script>
    function delete_wifi(ssi) {

    }
    function add_wifi(ssi) {

    }
    function get_wifi_list() {
        fetch(`/v1/get_wifi_list`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },

        }).then(response => response.json())
            .then(data => {
                const wifiListDiv = document.getElementById('wifi_list');

                let table = `
                    <table class="striped">
                        <thead>
                            <tr>
                                <th>SSID</th>
                                <th>Password</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                for (const [network, password] of Object.entries(data)) {
                    const btn = `<button class="secondary action-button" onclick="delete_wifi('${network}')">✕</button>`;
                    table += `
                        <tr>
                            <td>${network}</td>
                            <td>${password}</td>
                            <td>${btn}</td>
                        </tr>
                    `;
                }

                const ssid_input = `<input type="text" id="ssid_input" name="SSID" placeholder="New SSID">`;
                const password_input = `<input type="text" id="password_input" name="Password" placeholder="New Password">`;
                const btn = `<button class="secondary action-button" onclick="add_wifi()">Add</button>`;
                table += `
                        <tr>
                            <td>${ssid_input}</td>
                            <td>${password_input}</td>
                            <td>${btn}</td>
                        </tr>
                    </tbody>
                </table>`;

                wifiListDiv.innerHTML = table;
                console.log(data);
            }).catch(error => {
                console.log(error);
                document.getElementById('wifi_list').innerHTML = '<p>Error loading WiFi list</p>';
            });

    }

</script>

<body>
    <H1>Body of index page</H1>
    <button onclick="get_wifi_list()">Load WiFi Networks</button>
    <div id="wifi_list"></div>
    <button onclick="add_wifi()">Add wifi configuration</button>
    <button onclick="reconnect()">Load WiFi Networks</button>

</body>

</html>
